<script>
// ============================================================
//  SOURCES (بدون تغيير)
// ============================================================
const SRCS=[ /* نفس كودك كما هو */ ];

// ============================================================
//  PROXY STRATEGIES (تم تحسين fetch فقط)
// ============================================================
async function fetchFeed(feedUrl){
  const encoded=encodeURIComponent(feedUrl);

  try{
    const u=`https://api.rss2json.com/v1/api.json?rss_url=${encoded}&count=12`;
    const r=await fetch(u,{signal:AbortSignal.timeout(10000),cache:'no-store'});
    if(r.ok){const d=await r.json();if(d.status==='ok'&&d.items?.length>0)return{type:'rss2json',data:d};}
  }catch(e){}

  try{
    const u=`https://feedparser.xyz/api/parse?url=${encoded}`;
    const r=await fetch(u,{signal:AbortSignal.timeout(10000),cache:'no-store'});
    if(r.ok){const d=await r.json();if(d.entries?.length>0)return{type:'feedparser',data:d};}
  }catch(e){}

  try{
    const u=`https://api.allorigins.win/get?url=${encoded}`;
    const r=await fetch(u,{signal:AbortSignal.timeout(11000),cache:'no-store'});
    if(r.ok){const d=await r.json();if(d.contents&&d.contents.length>200)return{type:'xml',data:d.contents};}
  }catch(e){}

  try{
    const u=`https://corsproxy.io/?${encoded}`;
    const r=await fetch(u,{signal:AbortSignal.timeout(11000),cache:'no-store'});
    if(r.ok){const t=await r.text();if(t&&t.length>200)return{type:'xml',data:t};}
  }catch(e){}

  try{
    const u=`https://cors.bridged.cc/${feedUrl}`;
    const r=await fetch(u,{headers:{'x-cors-grida-api-key':'temp'},signal:AbortSignal.timeout(10000),cache:'no-store'});
    if(r.ok){const t=await r.text();if(t&&t.length>200)return{type:'xml',data:t};}
  }catch(e){}

  throw new Error('all proxies failed');
}

// ============================================================
//  (باقي دوال parsing كما هي بدون تغيير)
// ============================================================
// parseRss2json / parseFeedparser / parseXmlStr / mk / etc...

// ============================================================
//  TRANSLATION (تعديل مهم: بدون انتظار)
// ============================================================
async function trItem(item){
  if(item.lang==='ar'||item.translated) return;

  try{
    const[ta,da]=await Promise.all([
      trText(item.title),
      item.description?trText(item.description.substring(0,260)):Promise.resolve('')
    ]);

    item.titleAr=ta||item.title;
    item.descriptionAr=da||item.description;
    item.translated=true;

    trCount++;
    document.getElementById('sTr').textContent=trCount;

    liveUpdateCard(item);

  }catch(e){}
}

// ============================================================
//  MAIN FETCH (تم إصلاح البطء هنا)
// ============================================================
let allNews=[],trCount=0,busy=false;
let refreshInterval=null;

async function loadAll(){
  if(busy) return;
  busy=true;

  allNews=[];
  trCount=0;

  document.getElementById('sTr').textContent='0';
  document.getElementById('sCount').textContent='جاري التحميل...';
  document.getElementById('sTime').textContent='—';
  document.getElementById('rfBtn').classList.add('spin');

  toast('جاري تحميل الأخبار...');

  const now=new Date();
  document.getElementById('sTime').textContent=
    now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});

  // ✅ تحميل تدريجي (بدل الانتظار الكامل)
  await Promise.allSettled(SRCS.map(async(src)=>{
    try{
      const items=await loadSource(src);

      allNews.push(...items);

      allNews.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));

      document.getElementById('sCount').textContent=allNews.length;

      renderGrids();
      buildTicker(allNews);

      // تشغيل الترجمة بدون تعطيل
      items.filter(i=>i.lang==='en').forEach(trItem);

    }catch(e){}
  }));

  document.getElementById('rfBtn').classList.remove('spin');
  hideToast();
  busy=false;

  startAutoRefresh();
}

// ============================================================
//  AUTO REFRESH (تم إصلاحه)
// ============================================================
function startAutoRefresh(){
  if(refreshInterval) clearInterval(refreshInterval);

  refreshInterval=setInterval(()=>{
    refreshAll(true);
  }, 2*60*1000); // كل دقيقتين
}

function refreshAll(silent=false){
  if(busy) return;

  if(!silent){
    document.getElementById('rfBtn').classList.add('spin');
    toast('جاري التحديث...');
  }

  loadAll();
}

// ============================================================
//  INIT
// ============================================================
document.addEventListener('DOMContentLoaded',loadAll);
</script>
