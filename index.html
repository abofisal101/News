<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎯 1000 لغز عربي · غرف مباشرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0a0a; font-family: 'Cairo', sans-serif; color: white; min-height: 100vh; padding: 16px 12px; }
    .app { max-width: 480px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #ff1a1a); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .mini-leaderboard { background: #1a1a1a; border-radius: 20px; padding: 12px 16px; margin-bottom: 20px; border: 1px solid #333; }
    .mini-leaderboard .title { display: flex; justify-content: space-between; color: #ff4444; font-weight: 700; }
    .mini-leaderboard .players { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
    .player-chip { background: #222; padding: 6px 14px; border-radius: 30px; display: flex; align-items: center; gap: 6px; }
    .categories { margin-bottom: 20px; }
    .categories h3 { color: #aaa; font-size: 15px; margin-bottom: 12px; }
    .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .category-tag { background: #1a1a1a; border: 1px solid #333; border-radius: 14px; padding: 10px 6px; text-align: center; font-size: 13px; font-weight: 600; color: #ddd; }
    .category-tag.active { background: #ff1a1a; border-color: #ff4444; color: white; }
    .card { background: #151515; border-radius: 24px; padding: 20px; border: 1px solid #2a2a2a; margin-bottom: 16px; }
    .card.primary { background: linear-gradient(135deg, #1a0a0a, #150505); border-color: #ff3333; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .btn { background: #222; border: 1px solid #444; color: white; padding: 16px 20px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; text-align: center; width: 100%; font-family: 'Cairo', sans-serif; margin: 6px 0; }
    .btn-primary { background: #e60000; border-color: #ff3333; box-shadow: 0 4px 15px rgba(230,0,0,0.3); }
    .btn-primary:active { background: #cc0000; transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; }
    .input-group { display: flex; gap: 8px; }
    .input-group input { flex: 1; background: #0a0a0a; border: 1px solid #444; border-radius: 14px; padding: 14px 16px; color: white; font-size: 15px; font-family: 'Cairo', sans-serif; }
    .input-group input:focus { border-color: #ff4444; outline: none; }
    .screen { display: none; }
    .screen.active { display: block; }
    .game-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    .round-badge { background: #1a1a1a; padding: 8px 16px; border-radius: 30px; border: 1px solid #333; }
    .score-badge { background: #ff1a1a; padding: 8px 16px; border-radius: 30px; font-weight: 700; }
    .progress-bar { height: 8px; background: #1a1a1a; border-radius: 10px; margin: 16px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #ff1a1a; width: 100%; }
    .question-box { background: #151515; border-radius: 24px; padding: 24px 20px; margin: 20px 0; border: 1px solid #2a2a2a; text-align: center; }
    .question-text { font-size: 20px; font-weight: 700; line-height: 1.5; }
    .answers { display: grid; gap: 12px; margin: 20px 0; }
    .answer-btn { background: #1a1a1a; border: 1.5px solid #333; border-radius: 18px; padding: 16px; font-size: 16px; font-weight: 600; color: white; text-align: center; cursor: pointer; }
    .answer-btn:active { background: #2a2a2a; }
    .answer-btn.correct { background: #00a86b; border-color: #00ff88; }
    .answer-btn.wrong { background: #8b0000; border-color: #ff4444; }
    .players-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .player-badge { background: #1a1a1a; border: 1px solid #333; border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 8px; }
    .kick-btn { background: #550000; border: none; color: #ff8888; padding: 2px 8px; border-radius: 20px; cursor: pointer; font-size: 12px; }
    .status-message { color: #ffaa00; font-size: 14px; margin-top: 12px; text-align: center; }
    .end-stats { background: #1a1a1a; border-radius: 20px; padding: 20px; margin: 20px 0; text-align: center; }
    .final-score { font-size: 48px; font-weight: 900; color: #ff4444; }
    .slider-item { margin: 20px 0; }
    .slider-item label { display: flex; justify-content: space-between; margin-bottom: 8px; }
    input[type="range"] { width: 100%; accent-color: #ff1a1a; height: 6px; }
    .room-info { background: #1a0000; border-radius: 16px; padding: 12px; margin: 15px 0; border: 1px solid #ff4444; }
  </style>
</head>
<body>
<div class="app">
  <div class="mini-leaderboard" id="miniLeaderboard">
    <div class="title"><span>🏆 المتصدرون</span><span id="playerCount">👤 0</span></div>
    <div class="players" id="miniPlayersList"></div>
  </div>

  <!-- شاشة البداية -->
  <div id="homeScreen" class="screen active">
    <div class="header"><h1>🎯 1000 لغز عربي</h1><p style="color:#888;">غرف مباشرة · تحدي جماعي</p></div>
    <div class="categories"><h3>📚 فئات الأسئلة</h3><div class="category-grid" id="categoryTags"></div></div>
    <div class="card primary"><div class="card-title">✨ إنشاء غرفة جديدة</div><button class="btn btn-primary" id="homeCreateBtn">🎮 إنشاء غرفة</button></div>
    <div class="card"><div class="card-title">🔑 الانضمام إلى غرفة</div><div class="input-group"><input type="text" id="homeRoomInput" placeholder="أدخل رمز الغرفة"><button class="btn btn-primary" id="homeJoinBtn">دخول</button></div></div>
  </div>

  <!-- شاشة الإعدادات -->
  <div id="setupScreen" class="screen"><div class="header"><h2>⚙️ إعدادات الغرفة</h2></div><div class="card"><div class="card-title">🔑 رمز الغرفة: <span id="setupRoomCode" style="color:#ff4444;"></span></div></div><div class="card"><div class="slider-item"><label>🔴 عدد الجولات <span id="roundsVal">15</span></label><input type="range" id="roundsSlider" min="10" max="20" value="15"></div><div class="slider-item"><label>⏳ وقت التفكير <span id="thinkVal">15</span> ث</label><input type="range" id="thinkSlider" min="5" max="30" value="15"></div><div class="slider-item"><label>🕒 عرض الإجابة <span id="viewVal">3</span> ث</label><input type="range" id="viewSlider" min="2" max="5" value="3"></div><button class="btn btn-primary" id="saveSettingsBtn">💾 حفظ وفتح اللوبي</button></div></div>

  <!-- شاشة اللوبي -->
  <div id="lobbyScreen" class="screen"><div class="header"><h2>👥 غرفة الانتظار</h2></div><div class="card"><div class="card-title">🔑 رمز الغرفة: <span id="lobbyRoomCode" style="color:#ff4444;"></span></div><div class="room-info"><p>👑 المضيف: <span id="hostNameDisplay">...</span></p></div><input type="text" id="playerNameInput" placeholder="أدخل اسمك..." style="width:100%; padding:14px; background:#0a0a0a; border:1px solid #444; border-radius:14px; color:white; margin-bottom:16px;"><div class="players-list" id="lobbyPlayersList"></div><button class="btn btn-primary" id="readyBtn" disabled>✅ أنا جاهز</button><button class="btn btn-primary" id="startGameBtn" disabled style="display:none;">🔥 ابدأ التحدي</button><div class="status-message" id="lobbyStatus"></div><button class="btn" id="leaveLobbyBtn" style="margin-top:12px;">↩️ خروج</button></div></div>

  <!-- شاشة اللعب -->
  <div id="gameScreen" class="screen"><div class="game-header"><span class="round-badge" id="roundIndicator">جولة 1/15</span><span class="score-badge" id="scoreDisplay">🏅 0</span></div><div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:100%"></div></div><div class="question-box"><div class="question-text" id="questionText">تحميل السؤال...</div></div><div class="answers" id="answersContainer"></div><div class="status-message" id="gameMessage"></div></div>

  <!-- شاشة النهاية -->
  <div id="endScreen" class="screen"><div class="header"><h2>🏁 نهاية الجولة</h2></div><div class="card" style="text-align:center;"><div class="end-stats"><p style="color:#aaa;">نتيجتك</p><div class="final-score" id="finalScoreDisplay">0</div><p id="winnerMessage" style="margin-top:8px;"></p></div><div id="finalLeaderboardList" style="margin:20px 0;"></div><button class="btn btn-primary" id="playAgainBtn">🔄 جولة جديدة</button><button class="btn" id="backToLobbyBtn" style="margin-top:8px;">👥 العودة للغرفة</button></div></div>
</div>

<script>
  // ==================== Firebase ====================
  firebase.initializeApp({apiKey:"AIzaSyBKs24sqojKX51Q4HAPv3amY1oTGo3YcyA",authDomain:"myquiz-314f9.firebaseapp.com",databaseURL:"https://myquiz-314f9-default-rtdb.firebaseio.com",projectId:"myquiz-314f9",storageBucket:"myquiz-314f9.firebasestorage.app",messagingSenderId:"86590365416",appId:"1:86590365416:web:0d37b3695ec028103ff35d"});
  const db = firebase.database();

  // ==================== بنك الأسئلة من CSV ====================
  const riddlesBank = [];
  
  // دالة لتحميل الأسئلة من CSV مدمج
  function loadRiddlesFromCSV() {
    const csvData = `السؤال,أ,ب,ج,د,الإجابة الصحيحة,التصنيف
ما هو الكوكب الأحمر؟,الأرض,المريخ,المشتري,الزهرة,ب,متنوع
ما هي صيغة الماء؟,CO2,H2O,O2,NaCl,ب,متنوع
كم عدد لاعبي كرة القدم في الفريق؟,9,10,11,12,ج,متنوع
أكبر قارة في العالم؟,أفريقيا,آسيا,أوروبا,أمريكا,ب,متنوع
من فاز بكأس العالم 2018؟,ألمانيا,فرنسا,البرازيل,الأرجنتين,ب,متنوع
ما أسرع حيوان بري؟,الأسد,الفهد,الحصان,الذئب,ب,متنوع
ما عاصمة السعودية؟,جدة,الرياض,مكة,الدمام,ب,متنوع
كم عدد أركان الإسلام؟,3,4,5,6,ج,متنوع
كم عدد الصلوات المفروضة يومياً؟,3,4,5,6,ج,متنوع
في أي شهر يصوم المسلمون؟,محرم,رجب,رمضان,شوال,ج,متنوع
ما هي السورة التي تسمى قلب القرآن؟,يس,الرحمن,الإخلاص,البقرة,أ,دينية
كم عدد آيات سورة البقرة؟,286,200,255,300,أ,دينية
ما هي عاصمة السنغال؟,داكار,باماكو,أبيدجان,نواكشوط,أ,خرائط
أين يقع نهر الأمازون؟,أمريكا الجنوبية,أفريقيا,آسيا,أوروبا,أ,خرائط
من هو مخرج فيلم المصير؟,يوسف شاهين,عاطف الطيب,محمد خان,خالد يوسف,أ,أفلام
من هي سندريلا الشاشة العربية؟,سعاد حسني,فاتن حمامة,شادية,مريم فخر الدين,أ,أفلام
ما هو العدد الذي إذا ضربته في نفسه كان الناتج 64؟,8,6,7,9,أ,ألغاز
ما هو الشيء الذي كلما أخذت منه كبر؟,الحفرة,العمر,المال,الوقت,أ,ألغاز
له أوراق وما هو بنبات له جلد وما هو بحيوان؟,الكتاب,الشجرة,الحقيبة,البيت,أ,ألغاز
ما هو أطول نهر في العالم؟,النيل,الأمازون,المسيسيبي,اليانغتسي,أ,خرائط
كم عدد ألوان قوس قزح؟,7,6,8,5,أ,معلومات
من اخترع المصباح الكهربائي؟,إديسون,تسلا,بيل,ماركوني,أ,علوم
ما هو العنصر الكيميائي للذهب؟,Au,Ag,Fe,Cu,أ,علوم
كم عدد عظام الإنسان البالغ؟,206,200,210,195,أ,علوم
ما هي عاصمة اليابان؟,طوكيو,أوساكا,كيوتو,هيروشيما,أ,خرائط
ما هو الكوكب الأحمر؟,الأرض,المريخ,المشتري,الزهرة,ب,فلك
أكبر كوكب في المجموعة الشمسية؟,المشتري,زحل,أورانوس,نبتون,أ,فلك
أقرب كوكب للشمس؟,عطارد,الزهرة,الأرض,المريخ,أ,فلك
ما هي أكبر دولة عربية مساحة؟,الجزائر,السعودية,السودان,مصر,أ,خرائط
كم عدد الدول العربية؟,22,20,25,18,أ,خرائط
ما هي عاصمة كندا؟,أوتاوا,تورونتو,فانكوفر,مونتريال,أ,خرائط
أين يقع البحر الميت؟,بين الأردن وفلسطين,مصر,السعودية,العراق,أ,خرائط
ما هو أسرع حيوان بري؟,الفهد,الغزال,الأسد,الحصان,أ,معلومات
كم عدد ألوان قوس قزح؟,7,6,8,5,أ,معلومات
ما هو الكوكب الأحمر؟,المريخ,المشتري,الزهرة,عطارد,أ,فلك
من هو أول الخلفاء الراشدين؟,أبو بكر,عمر,عثمان,علي,أ,دينية
ما هي السورة التي تعدل ثلث القرآن؟,الإخلاص,الفلق,الناس,الكافرون,أ,دينية
في أي سنة هجرية فرض الصيام؟,2,1,3,4,أ,دينية
ما هو الحج الأصغر؟,العمرة,الطواف,السعي,الوقوف,أ,دينية
ما هي ليلة القدر؟,خير من ألف شهر,ليلة الإسراء,ليلة النصف,ليلة الجمعة,أ,دينية
أين يقع جبل طارق؟,بين إسبانيا والمغرب,إيطاليا,اليونان,تركيا,أ,خرائط
ما هي أكبر قارة؟,آسيا,أفريقيا,أمريكا,أوروبا,أ,خرائط
من هو بطل فيلم إشاعة حب؟,عمر الشريف,رشدي أباظة,صلاح ذو الفقار,شكري سرحان,أ,أفلام
ما هو الفيلم الذي فاز بأوسكار أفضل فيلم 2020؟,باراسايت,1917,جوكر,حدث ذات مرة,أ,أفلام
ما هي السلسلة الأعلى دخلاً في السينما؟,أفنجرز,هاري بوتر,ستار وورز,جيمس بوند,أ,أفلام
من هو بطل تيتانيك؟,ليوناردو دي كابريو,براد بيت,توم كروز,جوني ديب,أ,أفلام
فيلم العراب من إخراج؟,فرانسيس فورد كوبولا,مارتن سكورسيزي,سبيلبيرغ,تارانتينو,أ,أفلام
ما هو أكبر محيط؟,الهادئ,الأطلسي,الهندي,المتجمد,أ,معلومات
ما هو الشيء الذي يسمع بلا أذن ويتكلم بلا لسان؟,الهاتف,الراديو,التلفاز,الصدى,أ,ألغاز
ما هو الباب الذي لا يمكن فتحه؟,الباب المفتوح,باب السماء,باب القدر,باب السيارة,أ,ألغاز
أخت خالك وليست خالتك من هي؟,أمك,خالتك,عمتك,جدتك,أ,ألغاز
يمشي ويقف وليس له أرجل؟,الساعة,السيارة,القطار,الظل,أ,ألغاز
كلما زاد نقص؟,العمر,الحفرة,الظلام,الصمت,أ,ألغاز
بيت بلا أبواب؟,بيت الشعر,القبر,القلب,القفص,أ,ألغاز
يقرصك ولا تراه؟,الجوع,البعوض,النمل,البرد,أ,ألغاز`;
    
    const lines = csvData.split('\n');
    // تخطي العنوان
    for(let i = 1; i < lines.length; i++) {
      if(!lines[i].trim()) continue;
      const parts = lines[i].split(',');
      if(parts.length >= 7) {
        const question = parts[0];
        const options = [parts[1], parts[2], parts[3], parts[4]];
        const correctLetter = parts[5];
        const category = parts[6];
        
        let correctAnswer;
        if(correctLetter === 'أ') correctAnswer = parts[1];
        else if(correctLetter === 'ب') correctAnswer = parts[2];
        else if(correctLetter === 'ج') correctAnswer = parts[3];
        else if(correctLetter === 'د') correctAnswer = parts[4];
        
        riddlesBank.push({
          q: question,
          opts: shuffleArray([...options]),
          ans: correctAnswer,
          cat: category
        });
      }
    }
    
    // عرض الفئات
    const cats = [...new Set(riddlesBank.map(r => r.cat))];
    const grid = document.getElementById('categoryTags');
    grid.innerHTML = cats.slice(0, 8).map(c => `<span class="category-tag">${c}</span>`).join('');
  }
  
  function shuffleArray(a) { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function playSound(t) { try { const c=new (window.AudioContext||window.webkitAudioContext)(); if(c.state==='suspended') c.resume(); const o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.frequency.value=t==='correct'?880:(t==='wrong'?330:440); g.gain.setValueAtTime(0.1,c.currentTime); o.start();o.stop(c.currentTime+0.15); } catch(e) {} }
  
  loadRiddlesFromCSV();

  // ==================== حالة اللعبة ====================
  let settings = { rounds: 15, thinkTime: 15, viewTime: 3 };
  let screen = 'home', playerName = '', playerId = '', roomId = '', isHost = false, ready = false;
  let active = false, questions = [], round = 0, score = 0, timer = null, locked = false, correct = '';
  let players = {};

  const screens = { home: 'homeScreen', setup: 'setupScreen', lobby: 'lobbyScreen', game: 'gameScreen', end: 'endScreen' };
  function showScreen(s) { Object.values(screens).forEach(id => document.getElementById(id).classList.remove('active')); document.getElementById(screens[s]).classList.add('active'); screen = s; }

  function updateUI() {
    const arr = Object.entries(players).map(([id,p])=> ({...p, id}));
    document.getElementById('playerCount').innerText = `👤 ${arr.length}`;
    document.getElementById('miniPlayersList').innerHTML = arr.slice(0,4).map(p => `<span class="player-chip">${p.isHost?'👑':''} ${p.name} ${p.score||0}</span>`).join('');
    
    if(screen === 'lobby') {
      document.getElementById('lobbyPlayersList').innerHTML = arr.map(p => `<span class="player-badge">${p.isHost?'👑':''} ${p.name} ${p.ready?'✅':'⏳'} ${isHost&&!p.isHost?`<button class="kick-btn" onclick="kickPlayer('${p.id}')">✕</button>`:''}</span>`).join('');
      document.getElementById('hostNameDisplay').innerText = arr.find(p=>p.isHost)?.name || '...';
      const allReady = arr.every(p=>p.ready) && arr.length>=2;
      if(isHost) document.getElementById('startGameBtn').disabled = !allReady;
      document.getElementById('lobbyStatus').innerText = arr.length<2 ? '⏳ انتظار لاعب آخر...' : (allReady?'✅ الجميع جاهز!':'⏳ انتظار الجاهزية');
    }
  }

  window.kickPlayer = (id) => db.ref(`rooms/${roomId}/players/${id}`).remove();

  // ==================== الأحداث ====================
  document.getElementById('homeCreateBtn').onclick = () => { roomId = Math.random().toString(36).substring(2,8).toUpperCase(); isHost = true; document.getElementById('setupRoomCode').innerText = roomId; ['rounds','think','view'].forEach(s => { const e=document.getElementById(`${s}Slider`), v=document.getElementById(`${s}Val`); v.innerText=e.value; e.oninput=()=>v.innerText=e.value; }); showScreen('setup'); };
  
  document.getElementById('saveSettingsBtn').onclick = () => { settings = { rounds: +document.getElementById('roundsSlider').value, thinkTime: +document.getElementById('thinkSlider').value, viewTime: +document.getElementById('viewSlider').value }; db.ref(`rooms/${roomId}/settings`).set(settings); document.getElementById('lobbyRoomCode').innerText = roomId; initLobby(); };
  
  document.getElementById('homeJoinBtn').onclick = () => { const code = document.getElementById('homeRoomInput').value.trim().toUpperCase(); if(!code) return; db.ref(`rooms/${code}/settings`).once('value', s => { if(s.exists()){ roomId=code; isHost=false; settings=s.val(); document.getElementById('lobbyRoomCode').innerText=roomId; initLobby(); } else alert('الغرفة غير موجودة'); }); };
  
  function initLobby() {
    showScreen('lobby');
    document.getElementById('playerNameInput').oninput = function() { playerName=this.value.trim(); document.getElementById('readyBtn').disabled=!playerName; };
    document.getElementById('readyBtn').onclick = () => { if(!playerName) return; ready=true; playerId = (isHost?'host':'guest')+'_'+Date.now(); const ref = db.ref(`rooms/${roomId}/players/${playerId}`); ref.set({ name:playerName, ready:true, score:0, isHost }); ref.onDisconnect().remove(); document.getElementById('readyBtn').disabled=true; };
    if(isHost) { document.getElementById('startGameBtn').style.display='block'; document.getElementById('startGameBtn').onclick = () => { const all = Object.values(players); if(all.length>=2 && all.every(p=>p.ready)) { const qs = shuffleArray([...riddlesBank]).slice(0, settings.rounds); db.ref(`rooms/${roomId}/gameState`).set({ started:true, settings, questions:qs, round:0 }); } }; }
    db.ref(`rooms/${roomId}/players`).on('value', s => { players=s.val()||{}; updateUI(); });
    db.ref(`rooms/${roomId}/gameState`).on('value', s => { const st=s.val(); if(st?.started && screen==='lobby') { settings=st.settings; questions=st.questions; startGame(); } });
  }

  function startGame() { active=true; round=0; score=0; showScreen('game'); document.getElementById('scoreDisplay').innerText='🏅 0'; nextRound(); }
  
  function nextRound() { if(round >= settings.rounds) { endGame(); return; } locked=false; const q=questions[round]; correct=q.ans; document.getElementById('roundIndicator').innerText=`جولة ${round+1}/${settings.rounds}`; document.getElementById('questionText').innerText=q.q; const cont=document.getElementById('answersContainer'); cont.innerHTML=''; q.opts.forEach(o=>{ const b=document.createElement('div'); b.className='answer-btn'; b.innerText=o; b.onclick=()=>handleAnswer(o,b); cont.appendChild(b); }); let left=settings.thinkTime; const bar=document.getElementById('progressBar'); bar.style.width='100%'; if(timer)clearInterval(timer); timer=setInterval(()=>{ left-=0.1; bar.style.width=Math.max(0,(left/settings.thinkTime)*100)+'%'; if(left<=0){ clearInterval(timer); if(!locked){ locked=true; playSound('timeout'); showCorrect(); } } },100); }
  
  function handleAnswer(sel, btn) { if(locked) return; locked=true; clearInterval(timer); if(sel===correct) { playSound('correct'); score+=10; document.getElementById('scoreDisplay').innerText=`🏅 ${score}`; btn.classList.add('correct'); db.ref(`rooms/${roomId}/players/${playerId}/score`).set(score); } else { playSound('wrong'); btn.classList.add('wrong'); } document.querySelectorAll('.answer-btn').forEach(b=>b.style.pointerEvents='none'); setTimeout(showCorrect, settings.viewTime*1000); }
  
  function showCorrect() { document.querySelectorAll('.answer-btn').forEach(b=>{ if(b.innerText===correct) b.classList.add('correct'); }); setTimeout(()=>{ round++; nextRound(); }, settings.viewTime*1000); }
  
  function endGame() { active=false; showScreen('end'); confetti({particleCount:200, spread:100}); document.getElementById('finalScoreDisplay').innerText=score; const arr=Object.entries(players).sort((a,b)=>b[1].score-a[1].score); document.getElementById('winnerMessage').innerText=arr[0]?`🏆 الفائز: ${arr[0][1].name}`:''; document.getElementById('finalLeaderboardList').innerHTML=arr.map(p=>`<div style="display:flex;justify-content:space-between;padding:8px;"><span>${p[1].name}</span><span>${p[1].score||0}</span></div>`).join(''); }
  
  document.getElementById('playAgainBtn').onclick = () => { if(isHost) { const qs = shuffleArray([...riddlesBank]).slice(0, settings.rounds); db.ref(`rooms/${roomId}/gameState`).set({ started:true, settings, questions:qs, round:0 }); } };
  document.getElementById('backToLobbyBtn').onclick = () => { showScreen('lobby'); if(isHost) db.ref(`rooms/${roomId}/gameState`).set({ started:false }); };
  document.getElementById('leaveLobbyBtn').onclick = () => { if(playerId) db.ref(`rooms/${roomId}/players/${playerId}`).remove(); location.reload(); };
  
  updateUI();
</script>
</body>
</html>
