<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مرصد الأخبار العالمية</title>
  <link rel="icon" type="image/jpeg" href="https://www.genspark.ai/api/files/s/mGxb1TCU" />
  <link rel="apple-touch-icon" href="https://www.genspark.ai/api/files/s/mGxb1TCU" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a1628" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
<style>
:root{
  --bg:#0a1628;--bg2:#0d1e35;--card:#112240;--border:#1e3a5f;
  --red:#c8102e;--gold:#d4af37;--orange:#f5a623;--cyan:#00d4ff;
  --txt:#e8eaf0;--muted:#8892a4;--r:12px;
  --h:68px;--ticker:30px;--filter:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);direction:rtl;min-height:100vh}
header{position:fixed;top:0;inset-inline:0;z-index:1000;height:var(--h);background:linear-gradient(135deg,#060e1a,#112240,#060e1a);border-bottom:2px solid var(--red);display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 2px 24px rgba(200,16,46,.35);}
.logo{display:flex;align-items:center;gap:11px;text-decoration:none}
.logo img{width:44px;height:44px;border-radius:50%;border:2px solid var(--red);object-fit:cover}
.logo-text .t1{font-size:1.1rem;font-weight:900;color:#fff;line-height:1.2}
.logo-text .t2{font-size:.65rem;color:var(--orange);font-weight:600}
.hdr-right{display:flex;align-items:center;gap:10px}
.live{background:var(--red);color:#fff;font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1s infinite}
.refresh-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-family:'Cairo',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s}
.refresh-btn.spin i{animation:rotate 1s linear infinite}
.ticker{position:fixed;top:var(--h);inset-inline:0;z-index:999;height:var(--ticker);background:var(--red);display:flex;align-items:center;overflow:hidden;}
.ticker-label{background:#7a0018;color:#fff;font-size:.72rem;font-weight:800;padding:0 14px;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0;}
.ticker-wrap{flex:1;overflow:hidden;position:relative}
.ticker-inner{display:inline-flex;white-space:nowrap;animation:scroll 90s linear infinite}
.ticker-inner span{font-size:.75rem;color:#fff;font-weight:600;padding:0 18px;}
.filters{position:fixed;top:calc(var(--h) + var(--ticker));inset-inline:0;z-index:998;height:var(--filter);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;padding:0 14px;overflow-x:auto;}
.srch{position:relative;flex-shrink:0}
.srch i{position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.78rem}
.srch input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--txt);font-family:'Cairo',sans-serif;font-size:.8rem;padding:6px 28px 6px 10px;width:160px;outline:none;}
.fbtn{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:4px 12px;font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.fbtn.on{background:var(--red);border-color:var(--red);color:#fff}
main{max-width:1380px;margin:0 auto;padding:calc(var(--h) + var(--ticker) + var(--filter) + 16px) 14px 40px;}
.stats{display:flex;align-items:center;gap:16px;padding:8px 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;}
.stat{font-size:.74rem;color:var(--muted)}
.stat strong{color:var(--txt)}
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:12px;margin-top:20px;font-size:1rem;font-weight:800}
.bar{width:4px;height:20px;border-radius:2px;background:var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:.25s;text-decoration:none;color:inherit;}
.card:hover{transform:translateY(-4px);border-color:var(--red);box-shadow:0 10px 20px rgba(0,0,0,0.4)}
.cimg{position:relative;height:170px;background:#060e1a}
.cimg img{width:100%;height:100%;object-fit:cover}
.src-tag{position:absolute;top:9px;right:9px;color:#fff;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:4px;z-index:2}
.tr-tag{position:absolute;top:9px;left:9px;background:var(--gold);color:#000;font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:4px;}
.cbody{padding:12px;flex:1;}
.ctitle{font-size:.9rem;font-weight:700;line-height:1.5;margin-bottom:8px;}
.cfoot{display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);border-top:1px solid rgba(255,255,255,0.05);padding-top:8px}
.tools-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tool{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;text-align:center;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;gap:8px;}
.tool:hover{border-color:var(--orange)}
.sk-card{height:300px;background:var(--card);border-radius:var(--r);animation:shimmer 1.5s infinite linear;background: linear-gradient(90deg, #112240 25%, #1e3a5f 50%, #112240 75%);background-size: 200% 100%;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes rotate{to{transform:rotate(360deg)}}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:5000;display:none;align-items:center;justify-content:center}
.modal{background:var(--bg2);padding:20px;border-radius:var(--r);max-width:500px;width:90%;position:relative}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--red);padding:10px 20px;border-radius:30px;font-size:.8rem;z-index:9999;display:none}
</style>
</head>
<body>

<header>
  <a href="#" class="logo">
    <img src="https://www.genspark.ai/api/files/s/mGxb1TCU" alt="logo" />
    <div class="logo-text">
      <div class="t1">مرصد الأخبار العالمية</div>
      <div class="t2">تغطية حية وشاملة للأحداث</div>
    </div>
  </a>
  <div class="hdr-right">
    <div class="live"><div class="live-dot"></div>مباشر</div>
    <button class="refresh-btn" id="rfBtn" onclick="refreshAll()">
      <i class="fas fa-sync-alt"></i><span>تحديث</span>
    </button>
  </div>
</header>

<div class="ticker">
  <div class="ticker-label"><i class="fas fa-rss"></i> عاجل</div>
  <div class="ticker-wrap"><div class="ticker-inner" id="tickerInner"><span>جاري جلب العواجل...</span></div></div>
</div>

<nav class="filters">
  <div class="srch"><i class="fas fa-search"></i><input type="text" id="q" placeholder="ابحث..." oninput="renderGrids()" /></div>
  <button class="fbtn on" onclick="setFilter('all',this)">🌐 الكل</button>
  <button class="fbtn" onclick="setFilter('arabic',this)">🟢 عربي</button>
  <button class="fbtn" onclick="setFilter('intl',this)">🌍 دولي</button>
</nav>

<main>
  <div class="stats">
    <div class="stat"><i class="fas fa-newspaper"></i> أخبار: <strong id="sCount">0</strong></div>
    <div class="stat"><i class="fas fa-language"></i> مترجمة: <strong id="sTr">0</strong></div>
    <div class="stat"><i class="fas fa-clock"></i> آخر تحديث: <strong id="sTime">—</strong></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="bar"></div>أحدث الأخبار</div>
    <div class="grid" id="newsGrid"></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><div class="bar" style="background:var(--cyan)"></div>أدوات الرصد</div>
    <div class="tools-grid">
      <a href="https://www.flightradar24.com" target="_blank" class="tool"><i class="fas fa-plane"></i>Flightradar24</a>
      <a href="https://liveuamap.com" target="_blank" class="tool"><i class="fas fa-map-marked-alt"></i>Liveuamap</a>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const SRCS=[
  {id:'aljazeera',name:'الجزيرة',cat:'arabic',lang:'ar',feeds:['https://www.aljazeera.net/xml/rss2.0.xml'],color:'#e8282b'},
  {id:'skynews',name:'سكاي نيوز',cat:'arabic',lang:'ar',feeds:['https://www.skynewsarabia.com/rss.xml'],color:'#00a3e0'},
  {id:'alarabiya',name:'العربية',cat:'arabic',lang:'ar',feeds:['https://www.alarabiya.net/rss.xml'],color:'#005ea5'},
  {id:'bbc',name:'BBC عربي',cat:'arabic',lang:'ar',feeds:['https://feeds.bbci.co.uk/arabic/rss.xml'],color:'#bb1919'},
  {id:'reuters',name:'رويترز',cat:'intl',lang:'en',feeds:['https://www.reutersagency.com/feed/?post_type=best'],color:'#ff671f'},
  {id:'apnews',name:'AP',cat:'intl',lang:'en',feeds:['https://apnews.com/index.rss'],color:'#ff0000'}
];

let allNews=[], curFilt='all', busy=false, trCount=0;

async function fetchFeed(url){
  const cacheBuster = `&_cb=${Date.now()}`;
  try {
    const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url + cacheBuster)}&count=10`);
    const d = await r.json();
    return (d.status==='ok') ? d.items : [];
  } catch(e) { return []; }
}

async function loadAll(){
  if(busy) return;
  busy=true;
  trCount=0;
  allNews=[];
  document.getElementById('newsGrid').innerHTML = '<div class="sk-card"></div>'.repeat(6);
  document.getElementById('rfBtn').classList.add('spin');
  showToast("جاري تحديث البيانات من المصادر...");

  const promises = SRCS.map(async src => {
    const items = await fetchFeed(src.feeds[0]);
    return items.map((it, idx) => ({
      id: src.id + idx + Date.now(),
      title: it.title,
      titleAr: src.lang === 'ar' ? it.title : null,
      link: it.link,
      image: it.enclosure?.link || it.thumbnail || '',
      pubDate: it.pubDate,
      source: src.name,
      color: src.color,
      lang: src.lang,
      cat: src.cat,
      translated: false
    }));
  });

  const results = await Promise.all(promises);
  allNews = results.flat().sort((a,b)=> new Date(b.pubDate) - new Date(a.pubDate));
  
  renderGrids();
  buildTicker();
  document.getElementById('sTime').textContent = new Date().toLocaleTimeString('ar-SA');
  document.getElementById('rfBtn').classList.remove('spin');
  hideToast();
  busy=false;
  
  // ترجمة في الخلفية
  startBackgroundTranslation();
}

function renderGrids(){
  const q = document.getElementById('q').value.toLowerCase();
  const filtered = allNews.filter(it => {
    const matchSearch = it.title.toLowerCase().includes(q) || (it.titleAr && it.titleAr.includes(q));
    const matchCat = curFilt === 'all' || it.cat === curFilt;
    return matchSearch && matchCat;
  });

  document.getElementById('sCount').textContent = filtered.length;
  document.getElementById('newsGrid').innerHTML = filtered.map(it => `
    <a href="${it.link}" target="_blank" class="card">
      <div class="cimg">
        <div class="src-tag" style="background:${it.color}">${it.source}</div>
        ${it.translated ? '<div class="tr-tag">مترجم</div>' : ''}
        <img src="${it.image || 'https://via.placeholder.com/300x170/0d1e35/8892a4?text=News'}" onerror="this.src='https://via.placeholder.com/300x170/0d1e35/8892a4?text=No+Image'">
      </div>
      <div class="cbody">
        <div class="ctitle">${it.titleAr || it.title}</div>
        <div class="cfoot">
          <span>${it.source}</span>
          <span>${new Date(it.pubDate).toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>
      </div>
    </a>
  `).join('');
}

async function startBackgroundTranslation(){
  const toTr = allNews.filter(it => it.lang === 'en' && !it.translated);
  for(let it of toTr){
    if(busy) break; 
    try {
      const r = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(it.title.substring(0,500))}&langpair=en|ar`);
      const d = await r.json();
      if(d.responseData.translatedText){
        it.titleAr = d.responseData.translatedText;
        it.translated = true;
        trCount++;
        document.getElementById('sTr').textContent = trCount;
        if(trCount % 2 === 0) renderGrids(); // تحديث الواجهة كل خبرين مترجمين
      }
    } catch(e){}
    await new Promise(r => setTimeout(r, 500)); // تأخير بسيط لتجنب الحظر
  }
}

function setFilter(f, btn){
  curFilt = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderGrids();
}

function buildTicker(){
  const inner = document.getElementById('tickerInner');
  const txt = allNews.slice(0,10).map(it => `<span> ● ${it.titleAr || it.title}</span>`).join('');
  inner.innerHTML = txt + txt;
}

function refreshAll(){ loadAll(); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; }
function hideToast(){ document.getElementById('toast').style.display='none'; }

document.addEventListener('DOMContentLoaded', loadAll);
</script>
</body>
</html>
