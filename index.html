  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function generateRoomId() {
    return Math.random().toString(36).slice(2, 8).toUpperCase();
  }

  function playTone(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.value = type === "correct" ? 880 : type === "wrong" ? 240 : 500;
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
      osc.start();
      osc.stop(ctx.currentTime + 0.2);
    } catch (e) {}
  }

  function celebrate() {
    if (typeof confetti === "function") {
      confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function setHtml(id, value) {
    const el = $(id);

  function setStatus(id, msg, color = "") {
    const el = $(id);

    el.textContent = msg || "";

  // ==================== بنك الأسئلة ====================
  function normalizeQuestion(item, catFallback = "عام") {
    return {
      q: item.q || item.stem || "",
      opts: item.opts || item.options || [],
      ans: item.ans || item.answer || "",
      cat: item.cat || item.category || catFallback,
      difficulty: item.difficulty || "متوسط",
      source: item.source || "",
      ref: item.ref || ""
    };
  }

  // لو وفرت ملف خارجي questions-bank-5000.js سيُستخدم تلقائيًا
  function getQuestionBank() {
    if (Array.isArray(window.QUESTIONS_BANK_5000) && window.QUESTIONS_BANK_5000.length >= 5000) {
      return window.QUESTIONS_BANK_5000.map(q => normalizeQuestion(q));
    }
    return buildFallback5000Bank();
  }

      ]

    const intros = [
      "اختر الإجابة الصحيحة:",
      "سؤال سريع:",
      "ما الإجابة الصحيحة على الآتي:",
      "اختبر معلوماتك:",
      "في التحدي الحالي:"
    ];

    const endings = [
      "",
      "",
      "",
      " (تحدي)",
      " (سؤال معلومات)",
      " (جولة سريعة)"
    ];

    const bank = [];
    Object.entries(seed).forEach(([cat, arr]) => {
      let perCategory = 0;
      let i = 0;
      while (perCategory < 500) {
        const item = arr[i % arr.length];
        const intro = intros[i % intros.length];
        const ending = endings[i % endings.length];
        const roundNo = Math.floor(i / arr.length) + 1;
        bank.push({
          q: `${intro} ${item.q.replace(/\؟$/,'')} ${ending} #${roundNo}؟`,
          opts: shuffle(item.opts),
          ans: item.ans,
          cat,
          difficulty: roundNo < 20 ? "سهل" : roundNo < 50 ? "متوسط" : "صعب",
          source: "fallback",
          ref: ""
        });
        i++;
        perCategory++;
      }
    });
    return shuffle(bank).slice(0, 5000);

  const QUESTION_BANK = getQuestionBank();

  // ==================== مراقبة المستمعات ====================
  function addRoomListener(ref, event, callback) {
    ref.on(event, callback);
    roomListeners.push({ ref, event, callback });
  }

  function clearRoomListeners() {
    roomListeners.forEach(({ ref, event, callback }) => ref.off(event, callback));
    roomListeners = [];
  }

  // ==================== واجهة عامة ====================
  function refreshRoomActionButton() {
    const btn = $("exitRoomBtn");
    if (!roomId || currentScreen === "entry" || currentScreen === "setup") {
      btn.style.display = "none";
      return;
    }
    btn.style.display = "inline-flex";
    btn.textContent = isHost ? "🗑️ إلغاء الغرفة" : "🚪 خروج";
  }

  function updateLeaderboardUI() {
    const list = $("leaderboardList");
    const arr = Object.entries(playersData || {})
      .map(([id, p]) => ({ id, ...p }))
      .sort((a, b) => (b.score || 0) - (a.score || 0));

    setText("onlineCount", `👥 ${arr.length}`);

    if (!arr.length) {
      list.innerHTML = `<li class="leaderboard-item"><span>لا يوجد لاعبين بعد</span></li>`;
      return;
    }

    list.innerHTML = arr.map((p, i) => `
      <li class="leaderboard-item">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="rank">${i + 1}</span>
          <div>
            <div style="font-weight:900">${escapeHtml(p.name || "بدون اسم")} ${p.isHost ? "👑" : ""}</div>
            <div style="font-size:.85rem;color:#94a3b8">${p.ready ? "جاهز" : "غير جاهز"}</div>
          </div>
        </div>
        <div style="font-weight:900">${p.score || 0}</div>
      </li>
    `).join("");
  }

  function updateLobbyUI() {
    const arr = Object.entries(playersData || {}).map(([id, p]) => ({ id, ...p }));
    const playersList = $("playersList");
    const count = arr.length;

    setText("playerCountDisplay", String(count));

    const host = arr.find(p => p.isHost);
    setText("hostName", host ? host.name : "بانتظار المضيف");

    playersList.innerHTML = arr.map(p => `
      <span class="player-badge">
        ${p.isHost ? "👑" : "👤"}
        ${escapeHtml(p.name || "بدون اسم")}
        ${p.ready ? "✅" : "⏳"}
      </span>
    `).join("");

    if (isHost) {
      $("hostStartBtn").classList.remove("hidden");
      const allReady = count >= 2 && arr.every(p => p.ready);
      $("hostStartBtn").disabled = !allReady;
      setStatus("lobbyStatus", allReady ? "كل اللاعبين جاهزون، يمكنك بدء الجولة" : "يجب وجود لاعبين على الأقل وأن يكون الجميع جاهزين");
    } else {
      $("hostStartBtn").classList.add("hidden");
      setStatus("lobbyStatus", "بانتظار المضيف لبدء الجولة");
    }

    const myData = playersData[playerId];
    if (myData && typeof myData.score === "number") {
      score = myData.score;
      setText("scoreDisplay", `🏅 ${score}`);
    }
  }

  // ==================== إدارة الغرفة ====================
  async function createRoom() {
    roomId = generateRoomId();
    isHost = true;
    myReady = false;
    playerId = "";
    playerName = "";

    setText("displayRoomId", roomId);
    showScreen("setup");

    await db.ref(`rooms/${roomId}`).set({
      meta: {
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        closed: false
      },
      settings: gameSettings,
      players: {},
      gameState: {
        started: false,
        sessionId: ""
      }
    });
  }

  async function saveSettingsAndOpenLobby() {
    gameSettings = {
      rounds: +$("roundsSlider").value,
      thinkTime: +$("thinkSlider").value,
      answerViewTime: +$("answerViewSlider").value
    };

    await db.ref(`rooms/${roomId}/settings`).set(gameSettings);
    setText("lobbyRoomId", roomId);
    showScreen("lobby");
    attachRoomListeners();
    updateLobbyUI();
  }

  async function joinRoom() {
    const inputRoom = $("roomIdInput").value.trim().toUpperCase();
    if (!inputRoom) {
      setStatus("entryStatus", "اكتب معرف الغرفة أولًا", "#fca5a5");
      return;
    }

    const snap = await db.ref(`rooms/${inputRoom}`).once("value");
    if (!snap.exists()) {
      setStatus("entryStatus", "الغرفة غير موجودة", "#fca5a5");
      return;
    }

    const room = snap.val();
    if (room.meta?.closed) {
      setStatus("entryStatus", "الغرفة مغلقة", "#fca5a5");
      return;
    }

    roomId = inputRoom;
    isHost = false;
    myReady = false;
    playerId = "";
    playerName = "";
    gameSettings = room.settings || gameSettings;

    setText("lobbyRoomId", roomId);
    showScreen("lobby");
    attachRoomListeners();
  }

  function attachRoomListeners() {
    clearRoomListeners();

    addRoomListener(db.ref(`rooms/${roomId}/players`), "value", (snap) => {
      playersData = snap.val() || {};
      updateLobbyUI();
      updateLeaderboardUI();
      renderFinalLeaderboardIfVisible();
    });

    addRoomListener(db.ref(`rooms/${roomId}/settings`), "value", (snap) => {
      if (snap.exists()) gameSettings = snap.val();
    });

    addRoomListener(db.ref(`rooms/${roomId}/meta`), "value", (snap) => {
      const meta = snap.val() || {};
      if (meta.closed) {
        handleRoomClosed(meta.closedBy || "المضيف");
      }
    });

    addRoomListener(db.ref(`rooms/${roomId}/gameState`), "value", (snap) => {
      const state = snap.val();
      if (!state) return;

      if (state.started && state.sessionId && state.sessionId !== currentSessionId) {
        startSession(state);
      }
    });

    refreshRoomActionButton();
  }

  async function readyUp() {
    playerName = $("playerNameInput").value.trim();
    if (!playerName) {
      setStatus("lobbyStatus", "اكتب اسمك أولًا", "#fca5a5");
      return;
    }

    if (!playerId) {
      playerId = (isHost ? "host_" : "guest_") + Date.now() + "_" + Math.floor(Math.random() * 9999);
    }

    myReady = true;

    const playerRef = db.ref(`rooms/${roomId}/players/${playerId}`);
    await playerRef.set({
      name: playerName,
      ready: true,
      score: 0,
      isHost: isHost
    });

    playerRef.onDisconnect().remove();

    $("readyBtn").disabled = true;
    $("playerNameInput").disabled = true;
    setStatus("lobbyStatus", "تم تسجيلك في الغرفة");
  }

  async function startGameAsHost() {
    const arr = Object.values(playersData || {});
    const allReady = arr.length >= 2 && arr.every(p => p.ready);

    if (!allReady) {
      setStatus("lobbyStatus", "لازم لاعبين على الأقل والجميع يكون جاهز", "#fca5a5");
      return;
    }

    const selected = shuffle(QUESTION_BANK)
      .slice(0, gameSettings.rounds)
      .map(q => ({ ...q, opts: shuffle(q.opts) }));

    const newSessionId = "session_" + Date.now();

    const updates = {};
    Object.keys(playersData).forEach(pid => {
      updates[`rooms/${roomId}/players/${pid}/score`] = 0;
    });
    updates[`rooms/${roomId}/gameState`] = {
      started: true,
      sessionId: newSessionId,
      settings: gameSettings,
      questions: selected,
      createdAt: firebase.database.ServerValue.TIMESTAMP
    };

    await db.ref().update(updates);
  }

  async function playAgainSameRoom() {
    if (!isHost) return;
    await startGameAsHost();
  }

  async function closeRoomByHost() {
    const ok = window.confirm("هل تريد إلغاء الغرفة للجميع؟");
    if (!ok) return;

    await db.ref(`rooms/${roomId}/meta`).update({
      closed: true,
      closedBy: playerName || "المضيف",
      closedAt: firebase.database.ServerValue.TIMESTAMP
    });

    setTimeout(() => {
      db.ref(`rooms/${roomId}`).remove().catch(() => {});
    }, 1200);
  }

  async function leaveRoomAsGuest() {
    if (playerId && roomId) {
      await db.ref(`rooms/${roomId}/players/${playerId}`).remove().catch(() => {});
    }
    cleanupLocalState();
    showScreen("entry");
    setStatus("entryStatus", "تم الخروج من الغرفة");
  }

  function handleRoomClosed(byWho) {
    clearInterval(timerInterval);
    cleanupLocalState(true);
    showScreen("entry");
    setStatus("entryStatus", `تم إغلاق الغرفة بواسطة ${byWho}`, "#fca5a5");
  }

  function cleanupLocalState(keepEntryMessage = false) {
    clearInterval(timerInterval);
    clearRoomListeners();

    roomId = "";
    playerId = "";
    playerName = "";
    isHost = false;
    myReady = false;
    playersData = {};
    currentRound = 0;
    currentSessionId = "";
    questions = [];
    score = 0;
    answerLock = false;
    localQuestion = null;

    $("playerNameInput").value = "";
    $("playerNameInput").disabled = false;
    $("readyBtn").disabled = true;
    $("playAgainBtn").classList.remove("hidden");
    $("hostStartBtn").classList.add("hidden");
    refreshRoomActionButton();

    if (!keepEntryMessage) {
      setStatus("entryStatus", "");
    }
    updateLeaderboardUI();
  }

  // ==================== اللعب ====================
  function startSession(state) {
    currentSessionId = state.sessionId;
    questions = state.questions || [];
    gameSettings = state.settings || gameSettings;
    currentRound = 0;
    score = 0;
    answerLock = false;

    setText("scoreDisplay", "🏅 0");
    showScreen("game");
    nextRound();
  }

  function nextRound() {
    clearInterval(timerInterval);
    answerLock = false;

    if (currentRound >= questions.length) {
      finishGame();
      return;
    }

    localQuestion = questions[currentRound];
    setText("roundIndicator", `الجولة ${currentRound + 1} / ${questions.length}`);
    setText("questionCategory", localQuestion.cat || "عام");
    setText("questionDifficulty", localQuestion.difficulty || "متوسط");
    setText("questionText", localQuestion.q || "بدون سؤال");
    setStatus("gameMessage", "");

    const answersContainer = $("answersContainer");
    answersContainer.innerHTML = "";

    (localQuestion.opts || []).forEach((opt) => {
      const btn = document.createElement("button");
      btn.className = "answer-btn";
      btn.textContent = opt;
      btn.addEventListener("click", () => submitAnswer(opt, btn));
      answersContainer.appendChild(btn);
    });

    startRoundTimer();
  }

  function startRoundTimer() {
    const bar = $("progressBar");
    const total = Math.max(1, +gameSettings.thinkTime || 15);
    let remaining = total;
    bar.style.width = "100%";

    timerInterval = setInterval(() => {
      remaining -= 0.1;
      const percent = Math.max(0, (remaining / total) * 100);
      bar.style.width = percent + "%";

      if (remaining <= 0) {
        clearInterval(timerInterval);
        revealAnswer(null);
      }
    }, 100);
  }

  async function submitAnswer(answer, clickedBtn) {
    if (answerLock || !localQuestion) return;
    answerLock = true;
    clearInterval(timerInterval);

    const isCorrect = answer === localQuestion.ans;
    const buttons = [...document.querySelectorAll(".answer-btn")];

    buttons.forEach(btn => {
      btn.disabled = true;
      if (btn.textContent === localQuestion.ans) btn.classList.add("correct");
      if (btn.textContent === answer && answer !== localQuestion.ans) btn.classList.add("wrong");
      if (btn === clickedBtn) btn.classList.add("selected");
    });

    if (isCorrect) {
      score += 10;
      setText("scoreDisplay", `🏅 ${score}`);
      playTone("correct");
      celebrate();
      setStatus("gameMessage", "إجابة صحيحة ✅", "#86efac");
      if (playerId) {
        await db.ref(`rooms/${roomId}/players/${playerId}/score`).set(score).catch(() => {});
      }
    } else {
      playTone("wrong");
      setStatus("gameMessage", `إجابة خاطئة ❌ | الصحيحة: ${localQuestion.ans}`, "#fca5a5");
    }

    setTimeout(() => {
      currentRound++;
      nextRound();
    }, (gameSettings.answerViewTime || 3) * 1000);
  }

  function revealAnswer(selectedAnswer = null) {
    if (answerLock) return;
    answerLock = true;

    const buttons = [...document.querySelectorAll(".answer-btn")];
    buttons.forEach(btn => {
      btn.disabled = true;
      if (btn.textContent === localQuestion.ans) btn.classList.add("correct");
      if (selectedAnswer && btn.textContent === selectedAnswer && selectedAnswer !== localQuestion.ans) btn.classList.add("wrong");
    });

    setStatus("gameMessage", `انتهى الوقت ⏰ | الصحيحة: ${localQuestion.ans}`, "#fde68a");

    setTimeout(() => {
      currentRound++;
      nextRound();
    }, (gameSettings.answerViewTime || 3) * 1000);
  }

  function finishGame() {
    clearInterval(timerInterval);
    showScreen("end");
    renderFinalLeaderboard();

    if (isHost) {
      $("playAgainBtn").classList.remove("hidden");
      $("playAgainBtn").textContent = "🔄 جولة جديدة من نفس الغرفة";
    } else {
      $("playAgainBtn").classList.add("hidden");
      setStatus("entryStatus", "");
    }
  }

  function renderFinalLeaderboardIfVisible() {
    if (currentScreen === "end") renderFinalLeaderboard();
  }

  function renderFinalLeaderboard() {
    const arr = Object.entries(playersData || {})
      .map(([id, p]) => ({ id, ...p }))
      .sort((a, b) => (b.score || 0) - (a.score || 0));

    if (!arr.length) {
      setText("finalCongrats", "لا توجد نتائج");
      setHtml("finalLeaderboard", "");
      return;
    }

    const winner = arr[0];
    setText("finalCongrats", `الفائز: ${winner.name} 👑 بنتيجة ${winner.score || 0}`);

    setHtml("finalLeaderboard", arr.map((p, i) => `
      <div class="final-item">
        <div style="font-weight:900">${i + 1}. ${escapeHtml(p.name)} ${p.isHost ? "👑" : ""}</div>
        <div style="font-weight:900">${p.score || 0} نقطة</div>
      </div>
    `).join(""));
  }

  // ==================== الأحداث ====================
  function bindEvents() {
    $("createRoomBtn").addEventListener("click", createRoom);
    $("saveSettingsBtn").addEventListener("click", saveSettingsAndOpenLobby);
    $("joinRoomBtn").addEventListener("click", joinRoom);
    $("readyBtn").addEventListener("click", readyUp);
    $("hostStartBtn").addEventListener("click", startGameAsHost);
    $("playAgainBtn").addEventListener("click", playAgainSameRoom);

    $("exitRoomBtn").addEventListener("click", async () => {
      if (!roomId) return;
      if (isHost) {
        await closeRoomByHost();
      } else {
        await leaveRoomAsGuest();
      }
    });

    $("roomIdInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") joinRoom();
    });

    $("playerNameInput").addEventListener("input", (e) => {
      playerName = e.target.value.trim();
      $("readyBtn").disabled = !playerName || myReady;
    });

    $("roundsSlider").addEventListener("input", (e) => setText("roundsValue", e.target.value));
    $("thinkSlider").addEventListener("input", (e) => setText("thinkTimeValue", `${e.target.value} ث`));
    $("answerViewSlider").addEventListener("input", (e) => setText("answerViewValue", `${e.target.value}`));

    // تهيئة أولية
    setText("roundsValue", $("roundsSlider").value);
    setText("thinkTimeValue", `${$("thinkSlider").value} ث`);
    setText("answerViewValue", `${$("answerViewSlider").value}`);
    $("hostStartBtn").classList.add("hidden");
    updateLeaderboardUI();
    refreshRoomActionButton();
  }

  bindEvents();
</script>
