<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>✦ كَلاك · المسابقة التفاعلية ✦</title>
  <!-- خطوط عربية فخمة -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
  <!-- Firebase & confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', 'Tajawal', sans-serif;
      padding: 12px;
      color: white;
      /* تحسين للآيفون */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* الحاوية الزجاجية الرئيسية - محسنة للجوال */
    .game-container {
      width: 100%;
      max-width: 1300px;
      background: rgba(10, 0, 0, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 30, 30, 0.5);
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.3), inset 0 0 10px rgba(255, 40, 40, 0.2);
      border-radius: 32px;
      padding: 20px 16px;
      transition: all 0.2s;
    }

    /* للآيفون - padding أكبر قليلاً */
    @media (min-width: 400px) {
      .game-container {
        padding: 24px 20px;
        border-radius: 40px;
      }
    }

    /* شاشات مختلفة */
    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    /* عناوين نيونية - حجم مناسب للجوال */
    h1, h2, h3 {
      font-weight: 800;
      letter-spacing: 1px;
      text-shadow: 0 0 12px #ff1a1a, 0 0 25px #b30000;
    }

    h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #fff4f4, #ffb3b3);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }

    @media (min-width: 600px) {
      h1 { font-size: 3rem; }
    }

    /* زجاج + حدود نيون */
    .glass-panel {
      background: rgba(20, 0, 0, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 60, 60, 0.7);
      border-radius: 28px;
      padding: 24px 18px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.8), 0 0 20px #ff1a1a33;
    }

    @media (min-width: 600px) {
      .glass-panel {
        border-radius: 36px;
        padding: 30px 25px;
      }
    }

    .neon-btn {
      background: rgba(30, 0, 0, 0.6);
      border: 1.5px solid #ff3a3a;
      color: #ffe0e0;
      font-weight: bold;
      padding: 14px 20px;
      border-radius: 50px;
      font-size: 1.3rem;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 0 15px #ff000080, inset 0 0 5px #ff5555;
      font-family: 'Cairo', sans-serif;
      width: 100%;
      margin: 8px 0;
      -webkit-appearance: none;
      appearance: none;
    }

    @media (min-width: 600px) {
      .neon-btn {
        width: auto;
        padding: 16px 32px;
        font-size: 1.5rem;
      }
    }

    .neon-btn:hover {
      background: #a00;
      color: white;
      border-color: #ff7b7b;
      box-shadow: 0 0 30px #ff1a1a;
      transform: scale(1.02);
    }

    .neon-btn:disabled {
      opacity: 0.4;
      box-shadow: none;
      border-color: #777;
      pointer-events: none;
    }

    /* شريط التقدم */
    .progress-bar-container {
      height: 18px;
      background: #1a0000;
      border-radius: 40px;
      border: 1px solid #ff5555;
      margin: 16px 0;
      overflow: hidden;
      box-shadow: inset 0 0 12px black, 0 0 12px red;
    }

    .progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff0000, #ff6a6a);
      box-shadow: 0 0 20px #ff3a3a;
      transition: width 0.1s linear;
    }

    /* خيارات - عمودية على الجوال */
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    @media (min-width: 600px) {
      .answers-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        margin: 30px 0;
      }
    }

    .answer-btn {
      background: rgba(0,0,0,0.5);
      border: 1.8px solid #ff3a3a;
      color: white;
      padding: 18px 12px;
      border-radius: 24px;
      font-size: 1.2rem;
      font-weight: 600;
      backdrop-filter: blur(12px);
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 0 8px #ff0000;
      font-family: 'Tajawal', sans-serif;
      -webkit-appearance: none;
      appearance: none;
      word-break: break-word;
    }

    @media (min-width: 600px) {
      .answer-btn {
        padding: 22px 10px;
        font-size: 1.3rem;
        border-radius: 30px;
      }
    }

    .answer-btn:hover:not(:disabled) {
      background: #a00;
      border-color: #ffaaaa;
      box-shadow: 0 0 25px red;
    }

    .answer-btn.correct {
      background: #0f0;
      border-color: #aaffaa;
      box-shadow: 0 0 40px #00ff00;
    }

    .answer-btn.wrong {
      background: #400;
      border-color: #ff7777;
      opacity: 0.7;
    }

    /* القائمة الجانبية للنتائج - محسنة للجوال */
    .live-leaderboard {
      position: fixed;
      left: 12px;
      top: 12px;
      width: calc(100% - 24px);
      max-width: 280px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 2px solid #ff1a1a;
      border-radius: 24px;
      padding: 16px 12px;
      color: white;
      box-shadow: 0 0 40px #ff000050;
      z-index: 100;
      /* للآيفون notch */
      top: max(12px, env(safe-area-inset-top));
      left: max(12px, env(safe-area-inset-left));
    }

    @media (min-width: 700px) {
      .live-leaderboard {
        width: 260px;
        left: 20px;
        top: 20px;
        border-radius: 32px;
        padding: 20px 12px;
      }
    }

    .leaderboard-title {
      font-size: 1.3rem;
      border-bottom: 1px solid #ff5e5e;
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .leaderboard-list {
      list-style: none;
      max-height: 300px;
      overflow-y: auto;
    }

    .leaderboard-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 5px;
      border-bottom: 1px solid #5f0000;
      font-weight: 600;
      font-size: 1rem;
    }

    /* اللوبي */
    .lobby-players {
      margin: 20px 0;
      font-size: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .player-badge {
      background: #1a0000;
      border: 1px solid red;
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 1rem;
      box-shadow: 0 0 8px red;
    }

    input {
      background: #110000;
      border: 2px solid #ff4d4d;
      padding: 16px 18px;
      border-radius: 40px;
      font-size: 1.3rem;
      color: white;
      width: 100%;
      outline: none;
      font-family: 'Cairo';
      -webkit-appearance: none;
      appearance: none;
    }

    /* أزرار اللوبي في صف */
    .lobby-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (min-width: 600px) {
      .lobby-actions {
        flex-direction: row;
      }
    }

    /* نص الحالة */
    #lobbyStatus {
      margin-top: 16px;
      color: #ffb0b0;
      font-size: 1rem;
    }

    /* مؤشر الجولة والنقاط */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    #roundIndicator {
      font-size: 1.3rem;
    }

    #scoreDisplay {
      font-size: 1.3rem;
    }

    @media (min-width: 600px) {
      #roundIndicator, #scoreDisplay {
        font-size: 1.8rem;
      }
    }

    #questionText {
      margin: 20px 0;
      font-size: 1.6rem;
      line-height: 1.4;
      word-break: break-word;
    }

    @media (min-width: 600px) {
      #questionText {
        font-size: 2rem;
        margin: 30px 0;
      }
    }

    /* شاشة النهاية */
    #finalCongrats {
      margin: 20px 0;
      font-size: 1.6rem;
    }

    #finalLeaderboard {
      margin: 20px 0;
      font-size: 1.2rem;
    }

    /* تحسين التمرير */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #ff3a3a;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="live-leaderboard" id="liveLeaderboardPanel">
  <div class="leaderboard-title">🏆 المتصدرون</div>
  <ul class="leaderboard-list" id="leaderboardList"></ul>
</div>

<div class="game-container">
  <!-- شاشة الإعدادات الأولية -->
  <div id="setupScreen" class="screen active">
    <div class="glass-panel">
      <h1>⚙️ إعدادات الجولة</h1>
      <div style="margin: 30px 0;">
        <label style="font-size: 1.5rem; display: block; margin-bottom: 10px;">🔴 عدد الجولات: <span id="roundsValue">15</span></label>
        <input type="range" id="roundsSlider" min="10" max="20" value="15" step="1" style="width:100%; accent-color:#ff2a2a; height: 8px;">
      </div>
      <div style="margin: 30px 0;">
        <label style="font-size: 1.5rem; display: block; margin-bottom: 10px;">⏳ وقت التفكير: <span id="thinkTimeValue">15</span> ث</label>
        <input type="range" id="thinkSlider" min="5" max="30" value="15" step="1" style="width:100%; accent-color:#ff2a2a; height: 8px;">
      </div>
      <div style="margin: 30px 0;">
        <label style="font-size: 1.5rem; display: block; margin-bottom: 10px;">🕒 عرض الإجابة: <span id="answerViewValue">3</span> ث</label>
        <input type="range" id="answerViewSlider" min="2" max="5" value="3" step="1" style="width:100%; accent-color:#ff2a2a; height: 8px;">
      </div>
      <button class="neon-btn" id="applySettingsBtn">💾 حفظ و متابعة</button>
    </div>
  </div>

  <!-- شاشة الاسم واللوبي -->
  <div id="lobbyScreen" class="screen">
    <div class="glass-panel">
      <h2 style="font-size: 1.8rem;">🎮 اسم المتسابق</h2>
      <input type="text" id="playerNameInput" placeholder="أدخل اسمك..." maxlength="20" style="margin:16px 0;" enterkeyhint="done">
      <div id="lobbyInfo" style="margin:16px 0;">
        <p style="font-size: 1.3rem;">👥 اللاعبين في الغرفة: <span id="playerCountDisplay">0</span></p>
        <div id="playersList" class="lobby-players"></div>
      </div>
      <div class="lobby-actions">
        <button class="neon-btn" id="readyBtn" disabled>✅ أنا جاهز</button>
        <button class="neon-btn" id="startGameBtn" disabled>🔥 ابدأ اللعب</button>
      </div>
      <p id="lobbyStatus"></p>
    </div>
  </div>

  <!-- شاشة اللعب -->
  <div id="gameScreen" class="screen">
    <div class="glass-panel">
      <div class="game-header">
        <h2 id="roundIndicator">جولة 1 / 15</h2>
        <h2 id="scoreDisplay">🏅 0</h2>
      </div>
      <div class="progress-bar-container">
        <div id="progressBar" class="progress-fill" style="width:100%"></div>
      </div>
      <h3 id="questionText">...</h3>
      <div class="answers-grid" id="answersContainer"></div>
      <p id="gameMessage" style="text-align:center; min-height: 30px; font-size: 1.1rem;"></p>
    </div>
  </div>

  <!-- شاشة النهاية + القصاصات -->
  <div id="endScreen" class="screen">
    <div class="glass-panel" style="text-align:center;">
      <h1 style="font-size: 2rem;">🏁 انتهت المسابقة</h1>
      <h2 id="finalCongrats"></h2>
      <div id="finalLeaderboard"></div>
      <button class="neon-btn" id="playAgainBtn">🔄 العب مجدداً</button>
    </div>
  </div>
</div>

<!-- Scripts -->
<script type="module">
  // ---------- Firebase ----------
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyBKs24sqojKX51Q4HAPv3amY1oTGo3YcyA",
    authDomain: "myquiz-314f9.firebaseapp.com",
    databaseURL: "https://myquiz-314f9-default-rtdb.firebaseio.com",
    projectId: "myquiz-314f9",
    storageBucket: "myquiz-314f9.firebasestorage.app",
    messagingSenderId: "86590365416",
    appId: "1:86590365416:web:0d37b3695ec028103ff35d",
    measurementId: "G-YMJP9VT0B3"
  };
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // ---------- توليد 1000 لغز عربي (مختصر للكود لكن غني) ----------
  const riddlesBank = [];
  const categories = ["دينية", "خرائط ودول", "أفلام ومشاهير", "معلومات عامة", "ألغاز ذكاء"];
  
  function generate1000Riddles() {
    const baseQuestions = [
      { q: "ما هي السورة التي تسمى قلب القرآن؟", opts: ["يس", "الرحمن", "الإخلاص", "البقرة"], ans: "يس", cat: "دينية" },
      { q: "كم عدد آيات سورة البقرة؟", opts: ["286", "200", "255", "300"], ans: "286", cat: "دينية" },
      { q: "ما هي عاصمة السنغال؟", opts: ["داكار", "باماكو", "أبيدجان", "نواكشوط"], ans: "داكار", cat: "خرائط ودول" },
      { q: "أين يقع نهر الأمازون؟", opts: ["أمريكا الجنوبية", "أفريقيا", "آسيا", "أوروبا"], ans: "أمريكا الجنوبية", cat: "خرائط ودول" },
      { q: "من هو مخرج فيلم 'المصير'؟", opts: ["يوسف شاهين", "عاطف الطيب", "محمد خان", "خالد يوسف"], ans: "يوسف شاهين", cat: "أفلام ومشاهير" },
      { q: "ما هو أسرع حيوان بري؟", opts: ["الفهد", "الغزال", "الأسد", "الحصان"], ans: "الفهد", cat: "معلومات عامة" },
      { q: "ما هو العدد الذي إذا ضربته في نفسه كان الناتج 64؟", opts: ["8", "6", "7", "9"], ans: "8", cat: "ألغاز ذكاء" },
    ];
    for(let i=0; i<1000; i++){
      let idx = i % baseQuestions.length;
      let qObj = {...baseQuestions[idx]};
      qObj.q = qObj.q + (i>0 ? ` (${i+1})` : '');
      riddlesBank.push(qObj);
    }
  }
  generate1000Riddles();
  
  // خوارزمية خلط
  function shuffleArray(arr) { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
  
  // مؤثرات صوتية (placeholder)
  function playSound(type){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      if(ctx.state === 'suspended') ctx.resume();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value = type==='correct'? 800 : (type==='wrong'? 250 : 400);
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      osc.start(); osc.stop(ctx.currentTime+0.15);
    }catch(e){}
  }
  
  // ---------- state ----------
  let gameSettings = { rounds: 15, thinkTime: 15, answerViewTime: 3 };
  let currentScreen = 'setup';
  let playerName = '';
  let playerId = '';
  let roomRef = ref(db, 'rooms/mainRoom');
  let myReady = false;
  let gameActive = false;
  let questions = [];
  let currentRound = 0;
  let score = 0;
  let timerInterval = null;
  let answerLock = false;
  let correctAnswer = '';
  let playersData = {};
  
  // DOM
  const screens = { setup: document.getElementById('setupScreen'), lobby: document.getElementById('lobbyScreen'), game: document.getElementById('gameScreen'), end: document.getElementById('endScreen') };
  function showScreen(id){ Object.keys(screens).forEach(s=>screens[s].classList.remove('active')); screens[id].classList.add('active'); currentScreen=id; }
  
  // Sliders
  const roundsSlider = document.getElementById('roundsSlider'), thinkSlider = document.getElementById('thinkSlider'), answerViewSlider = document.getElementById('answerViewSlider');
  document.getElementById('roundsValue').innerText = roundsSlider.value;
  document.getElementById('thinkTimeValue').innerText = thinkSlider.value;
  document.getElementById('answerViewValue').innerText = answerViewSlider.value;
  roundsSlider.oninput = ()=> document.getElementById('roundsValue').innerText = roundsSlider.value;
  thinkSlider.oninput = ()=> document.getElementById('thinkTimeValue').innerText = thinkSlider.value;
  answerViewSlider.oninput = ()=> document.getElementById('answerViewValue').innerText = answerViewSlider.value;
  
  document.getElementById('applySettingsBtn').onclick = ()=>{
    gameSettings.rounds = +roundsSlider.value;
    gameSettings.thinkTime = +thinkSlider.value;
    gameSettings.answerViewTime = +answerViewSlider.value;
    showScreen('lobby');
    initLobby();
  };
  
  function initLobby(){
    document.getElementById('playerNameInput').value = '';
    document.getElementById('readyBtn').disabled = true;
    document.getElementById('startGameBtn').disabled = true;
    myReady = false;
    updateLobbyUI();
  }
  
  document.getElementById('playerNameInput').oninput = function(){
    playerName = this.value.trim();
    document.getElementById('readyBtn').disabled = !playerName;
  };
  
  document.getElementById('readyBtn').onclick = async ()=>{
    if(!playerName) return;
    playerId = playerName + '_' + Date.now();
    const playerRef = ref(db, `rooms/mainRoom/players/${playerId}`);
    await set(playerRef, { name: playerName, ready: true, score: 0 });
    myReady = true;
    document.getElementById('readyBtn').disabled = true;
  };
  
  // مزامنة Firebase
  onValue(ref(db, 'rooms/mainRoom/players'), (snap)=>{
    playersData = snap.val() || {};
    const playerCount = Object.keys(playersData).length;
    document.getElementById('playerCountDisplay').innerText = playerCount;
    const listDiv = document.getElementById('playersList');
    listDiv.innerHTML = '';
    let allReady = playerCount>0;
    for(let id in playersData){
      const p = playersData[id];
      listDiv.innerHTML += `<span class="player-badge">${p.name} ${p.ready?'✅':'⏳'}</span>`;
      if(!p.ready) allReady = false;
    }
    const canStart = playerCount>=2 && allReady;
    document.getElementById('startGameBtn').disabled = !canStart;
    if(!canStart && playerCount>0) {
      document.getElementById('lobbyStatus').innerText = playerCount<2 ? '⏳ في انتظار لاعب آخر...' : '⏳ في انتظار جاهزية الجميع';
    } else {
      document.getElementById('lobbyStatus').innerText = '';
    }
    updateLiveLeaderboard();
  });
  
  onValue(ref(db, 'rooms/mainRoom/gameState'), (snap)=>{
    const state = snap.val();
    if(state && state.started && currentScreen==='lobby' && gameActive===false){
      startGameForAll(state.settings, state.questions);
    }
  });
  
  function updateLiveLeaderboard(){
    const list = document.getElementById('leaderboardList');
    list.innerHTML = '';
    const arr = Object.entries(playersData).map(([id,p])=> ({name:p.name, score:p.score||0}));
    arr.sort((a,b)=> b.score - a.score);
    arr.forEach(p=>{ const li = document.createElement('li'); li.className='leaderboard-item'; li.innerHTML=`<span>${p.name}</span><span>${p.score}</span>`; list.appendChild(li); });
  }
  
  document.getElementById('startGameBtn').onclick = async ()=>{
    if(!myReady) return;
    const playerCount = Object.keys(playersData).length;
    if(playerCount<2) { alert("يجب وجود لاعبين اثنين على الأقل"); return; }
    const shuffled = shuffleArray([...riddlesBank]);
    const selected = shuffled.slice(0, gameSettings.rounds);
    await set(ref(db, 'rooms/mainRoom/gameState'), {
      started: true,
      settings: gameSettings,
      questions: selected,
      currentRound: 0,
      roundEndTime: 0
    });
  };
  
  function startGameForAll(settings, qs){
    gameSettings = settings;
    questions = qs;
    currentRound = 0;
    score = 0;
    gameActive = true;
    showScreen('game');
    document.getElementById('scoreDisplay').innerText = '🏅 0';
    startRound();
  }
  
  function startRound(){
    if(currentRound >= gameSettings.rounds){
      endGame();
      return;
    }
    answerLock = false;
    const q = questions[currentRound];
    correctAnswer = q.ans;
    document.getElementById('roundIndicator').innerText = `جولة ${currentRound+1} / ${gameSettings.rounds}`;
    document.getElementById('questionText').innerText = q.q;
    const opts = shuffleArray([...q.opts]);
    const container = document.getElementById('answersContainer');
    container.innerHTML = '';
    opts.forEach(opt=>{
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.innerText = opt;
      btn.onclick = ()=> handleAnswer(opt, btn);
      container.appendChild(btn);
    });
    document.getElementById('gameMessage').innerText = '';
    
    let timeLeft = gameSettings.thinkTime;
    const progressBar = document.getElementById('progressBar');
    progressBar.style.width = '100%';
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
      timeLeft -= 0.1;
      const percent = (timeLeft / gameSettings.thinkTime)*100;
      progressBar.style.width = Math.max(0, percent)+'%';
      if(timeLeft <= 0){
        clearInterval(timerInterval);
        if(!answerLock){ answerLock = true; playSound('timeout'); showCorrectAnswer(); }
      }
    }, 100);
  }
  
  function handleAnswer(selected, btn){
    if(answerLock) return;
    answerLock = true;
    clearInterval(timerInterval);
    const isCorrect = (selected === correctAnswer);
    if(isCorrect){
      playSound('correct');
      score += 10;
      document.getElementById('scoreDisplay').innerText = `🏅 ${score}`;
      btn.classList.add('correct');
      if(playerId) update(ref(db, `rooms/mainRoom/players/${playerId}`), { score: score });
    } else {
      playSound('wrong');
      btn.classList.add('wrong');
    }
    document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
    setTimeout(()=>{ showCorrectAnswer(); }, gameSettings.answerViewTime * 1000);
  }
  
  function showCorrectAnswer(){
    document.querySelectorAll('.answer-btn').forEach(b=>{ if(b.innerText === correctAnswer) b.classList.add('correct'); });
    setTimeout(()=>{
      currentRound++;
      startRound();
    }, gameSettings.answerViewTime * 1000);
  }
  
  function endGame(){
    gameActive = false;
    showScreen('end');
    confetti({particleCount:200, spread:100, origin:{y:0.6}});
    document.getElementById('finalCongrats').innerText = `${playerName} · نتيجتك: ${score}`;
    const lb = document.getElementById('finalLeaderboard');
    lb.innerHTML = '<h3 style="margin-bottom:15px;">🏆 الترتيب النهائي</h3>';
    const arr = Object.entries(playersData).map(([id,p])=> ({name:p.name, score:p.score||0}));
    arr.sort((a,b)=> b.score - a.score);
    arr.forEach(p=>{ lb.innerHTML += `<p style="font-size:1.3rem; margin:8px 0;">${p.name} : ${p.score}</p>`; });
  }
  
  document.getElementById('playAgainBtn').onclick = ()=>{
    location.reload();
  };
  
  // تفعيل AudioContext عند أول لمسة (سياسة المتصفح)
  document.body.addEventListener('touchstart', function initAudio(){ 
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(ctx.state === 'suspended') ctx.resume();
    document.body.removeEventListener('touchstart', initAudio);
  }, {once: true});
  
  window.updateLiveLeaderboard = updateLiveLeaderboard;
</script>
</body>
</html>
